# azd configuration for the Agentic Claims Processing PoC (v2)
# Docs: https://aka.ms/azure-dev/schema
name: claims-poc
metadata:
  template: claims-poc@2.0.0
infra:
  provider: bicep
  path: infra
  module: main
services:
  api:
    project: ./src/api
    language: python
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true
  web:
    project: ./src/web
    language: ts
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true
  external-apis:
    project: ./src/external-apis
    language: python
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true
hooks:
  postprovision:
    windows:
      shell: pwsh
      run: python infra/data/seed_all.py
      interactive: true
    posix:
      shell: sh
      run: python infra/data/seed_all.py
      interactive: true
  reseed:
    windows:
      shell: pwsh
      run: python infra/data/seed_all.py --reseed
    posix:
      shell: sh
      run: python infra/data/seed_all.py --reseed
